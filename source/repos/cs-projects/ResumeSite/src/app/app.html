@if (isHome()) {
  @if (useMinimalHomeNav()) {
    <app-home-hud
      [score]="score()"
      [showSessionScore]="hasScoredThisSession()"
      [isDarkMode]="isDarkMode()"
      (showCommandPalette)="openCommandPalette()"
      (showShortcuts)="showKeyboardHints()"
      (toggleTheme)="toggleDarkMode()"
      (showLeaderboard)="showLeaderboard()"
    />
  } @else {
    <nav class="top-nav">
      <div class="container nav-inner">
        <div class="nav-links">
          <a [class.active]="activeNavSection() === 'work'" (click)="scrollTo('work')">Work</a>
          <a routerLink="/about">About</a>
          <a [class.active]="activeNavSection() === 'summary'" (click)="scrollTo('summary')">Summary</a>
          <a [class.active]="activeNavSection() === 'projects'" (click)="scrollTo('projects')">Projects</a>
          <a [class.active]="activeNavSection() === 'experience'" (click)="scrollTo('experience')">Experience</a>
          <a [class.active]="activeNavSection() === 'technologies'" (click)="scrollTo('technologies')">Technologies</a>
        </div>
        @if (hasScoredThisSession()) {
          <button type="button" class="score-counter" (click)="showLeaderboard()" title="View leaderboard">
            <span class="hud-score-kicker">Score</span> {{ score() }}
          </button>
        }
        <div class="nav-actions">
          <button type="button" class="link-btn" (click)="showKeyboardHints()" title="Keyboard shortcuts (?)" aria-label="Keyboard shortcuts"><span aria-hidden="true">?</span></button>
          <button type="button" class="link-btn link-btn--icon" (click)="toggleDarkMode()" title="Toggle dark mode" aria-label="Toggle dark mode">
            <ui-icon [name]="isDarkMode() ? 'sun' : 'moon'" />
          </button>
          <button type="button" class="link-btn" (click)="scrollToTop()">Top</button>
        </div>
      </div>
    </nav>
  }
} @else {
<div class="subpage-dock" aria-label="Page controls">
  <a routerLink="/" class="subpage-dock-pill subpage-dock-home">← Home</a>
  <div class="subpage-dock-utils">
    @if (hasScoredThisSession()) {
      <button type="button" class="subpage-dock-pill subpage-dock-score" (click)="showLeaderboard()" title="View leaderboard">
        <span class="hud-score-kicker">Score</span> {{ score() }}
      </button>
    }
    <button type="button" class="subpage-dock-pill subpage-dock-icon" (click)="showKeyboardHints()" title="Keyboard shortcuts (?)" aria-label="Keyboard shortcuts"><span class="dock-glyph" aria-hidden="true">?</span></button>
    <button type="button" class="subpage-dock-pill subpage-dock-icon" (click)="toggleDarkMode()" title="Toggle dark mode" aria-label="Toggle dark mode">
      <ui-icon [name]="isDarkMode() ? 'sun' : 'moon'" />
    </button>
  </div>
</div>
}

<main class="app-page-host" [class.app-page-host--home]="isHome()" [class.app-page-host--minimal-nav]="isHome() && useMinimalHomeNav()">
  <router-outlet />
</main>
