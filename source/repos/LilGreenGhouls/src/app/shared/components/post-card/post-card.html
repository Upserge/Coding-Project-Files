<a [routerLink]="['/adventures', post().slug]"
   class="gradient-border-hover glass group block overflow-hidden no-underline transition-all duration-300 hover:scale-[1.02]">
  <!-- Cover Image -->
  @if (post().coverImageUrl) {
    <div class="aspect-video overflow-hidden">
      <img [src]="post().coverImageUrl" [alt]="post().title"
           class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110" />
    </div>
  } @else {
    <!-- Shimmer placeholder when no image -->
    <div class="shimmer aspect-video"></div>
  }

  <div class="p-5">
    <!-- Tags -->
    @if (post().tags?.length) {
      <div class="mb-2 flex flex-wrap gap-2">
        @for (tag of post().tags; track tag) {
          <span class="rounded-full border border-haunt-purple/30 bg-haunt-purple/10 px-2.5 py-0.5 text-xs text-haunt-purple transition-colors group-hover:border-ecto-green/30 group-hover:text-ecto-green">
            {{ tag }}
          </span>
        }
      </div>
    }

    <!-- Title -->
    <h3 class="mb-2 font-display text-xl text-ghost-white transition-colors group-hover:text-ecto-green">
      {{ post().title }}
    </h3>

    <!-- Excerpt -->
    <p class="mb-3 line-clamp-2 text-sm text-mist/70">{{ post().excerpt }}</p>

    <!-- Meta -->
    <div class="flex items-center justify-between text-xs text-mist/50">
      <span>{{ post().authorName }}</span>
      @if (post().publishedAt) {
        <span>{{ post().publishedAt!.toDate() | date:'mediumDate' }}</span>
      }
    </div>

    <!-- Read more indicator -->
    <div class="mt-3 flex items-center gap-1 text-xs text-ecto-green/0 transition-all duration-300 group-hover:text-ecto-green">
      Read encounter →
    </div>
  </div>
</a>
