<div class="glass mx-auto max-w-md p-6 text-center">
  <h3 class="mb-2 font-display text-2xl text-ghost-white">Stay Haunted 👻</h3>
  <p class="mb-4 text-sm text-mist/70">Subscribe to get notified when we post new paranormal adventures.</p>

  @switch (status()) {
    @case ('success') {
      <div class="rounded-lg bg-ecto-green/10 p-4 text-ecto-green">
        ✅ You're in! Watch your inbox for spooky updates.
      </div>
    }
    @case ('error') {
      <div class="mb-4 rounded-lg bg-blood-red/10 p-3 text-sm text-blood-red">
        Something went wrong. Please try again.
      </div>
    }
    @default {
      <form (ngSubmit)="subscribe()" class="flex gap-2">
        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com" required
               class="flex-1 rounded-lg border border-haunt-purple/30 bg-void px-4 py-2 text-mist outline-none transition-colors placeholder:text-mist/30 focus:border-ecto-green" />
        <button type="submit" [disabled]="status() === 'loading'"
                class="glow-green rounded-lg bg-ecto-green px-6 py-2 font-semibold text-void transition-all hover:bg-candle-glow disabled:opacity-50">
          @if (status() === 'loading') {
            ...
          } @else {
            Subscribe
          }
        </button>
      </form>
    }
  }
</div>
