<div class="hud-overlay">
  <!-- Top bar: phase + timer -->
  <div class="hud-top">
    <span class="phase-badge">{{ phase() | uppercase }}</span>
    <span class="timer">{{ timeRemaining() }}s</span>
  </div>

  <!-- Role-specific middle section -->
  @if (isHider()) {
    <div class="hud-role hider-hud">
      <div class="idle-bar-wrapper">
        <label class="bar-label">Move!</label>
        <div class="bar-track">
          <div class="bar-fill idle-fill"
               [style.width.%]="idlePercent() * 100"
               [class.critical]="idlePercent() > 0.7"></div>
        </div>
      </div>
      @if (isHiding()) {
        <div class="hidden-badge">HIDDEN</div>
      }
    </div>
  }

  @if (isHunter()) {
    <div class="hud-role hunter-hud">
      <div class="hunger-bar-wrapper">
        <label class="bar-label">Hunger</label>
        <div class="bar-track">
          <div class="bar-fill hunger-fill"
               [style.width.%]="hungerPercent() * 100"
               [class.critical]="hungerPercent() < 0.25"></div>
        </div>
      </div>
      <div class="stamina-bar-wrapper">
        <label class="bar-label">Stamina</label>
        <div class="bar-track">
          <div class="bar-fill stamina-fill"
               [style.width.%]="staminaPercent() * 100"
               [class.low]="staminaPercent() < 0.2"></div>
        </div>
      </div>
    </div>
  }

  <!-- Kill-feed notifications -->
  @if (catchFeed().length > 0) {
    <div class="kill-feed">
      @for (event of catchFeed(); track event.time) {
        <div class="kill-entry">
          <span class="kill-hunter">{{ event.hunterName }}</span>
          <span class="kill-icon">⚔</span>
          <span class="kill-hider">{{ event.hiderName }}</span>
        </div>
      }
    </div>
  }

  <!-- Bottom bar: score + player count -->
  <div class="hud-bottom">
    <span class="score">Score: {{ score() }}</span>
    <span class="players">Players: {{ playerCount() }}</span>
  </div>
</div>
