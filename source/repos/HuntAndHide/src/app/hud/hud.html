<div class="hud-overlay">
  <!-- Top bar: phase + timer -->
  <div class="hud-top">
    <span class="phase-badge">{{ phase() | uppercase }}</span>
    <span class="timer">{{ timeRemaining() }}s</span>
  </div>

  <!-- Role-specific middle section -->
  @if (isHider()) {
    <div class="hud-role hider-hud">
      <div class="idle-bar-wrapper">
        <label class="bar-label">Move!</label>
        <div class="bar-track">
          <div class="bar-fill idle-fill"
               [style.width.%]="idlePercent() * 100"
               [class.critical]="idlePercent() > 0.7"></div>
        </div>
      </div>
      @if (activeItem()) {
        <div class="active-item">{{ activeItem() }}</div>
      }
    </div>
  }

  @if (isHunter()) {
    <div class="hud-role hunter-hud">
      <div class="hunger-bar-wrapper">
        <label class="bar-label">Hunger</label>
        <div class="bar-track">
          <div class="bar-fill hunger-fill"
               [style.width.%]="hungerPercent() * 100"
               [class.critical]="hungerPercent() < 0.25"></div>
        </div>
      </div>
    </div>
  }

  <!-- Item bar (2 slots) -->
  <div class="item-bar">
    <div class="item-slot" [class.empty]="slot1().empty" [class.weapon]="slot1().isWeapon">
      <span class="slot-key">1</span>
      @if (!slot1().empty) {
        <span class="slot-name">{{ slot1().name }}</span>
      }
    </div>
    <div class="item-slot" [class.empty]="slot2().empty" [class.weapon]="slot2().isWeapon">
      <span class="slot-key">2</span>
      @if (!slot2().empty) {
        <span class="slot-name">{{ slot2().name }}</span>
      }
    </div>
    <span class="pickup-hint">[F] Pick up</span>
  </div>

  <!-- Bottom bar: score + player count -->
  <div class="hud-bottom">
    <span class="score">Score: {{ score() }}</span>
    <span class="players">Players: {{ playerCount() }}</span>
  </div>
</div>
