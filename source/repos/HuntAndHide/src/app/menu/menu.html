<div class="menu-container">
  <h1 class="title">Hunt &amp; Hide</h1>
  <p class="subtitle">A multiplayer hide-and-seek game</p>

  <div class="menu-actions">
    <button class="btn btn-primary" (click)="quickPlay()" [disabled]="isJoining()">
      {{ isJoining() ? 'Joining...' : 'Quick Play' }}
    </button>
  </div>

  @if (errorMsg(); as msg) {
    <p class="error-msg">{{ msg }}</p>
  }
</div>

@if (showModal()) {
  <app-username-modal
    (confirmed)="onNameConfirmed($event)"
    (cancelled)="onModalCancelled()"
  />
}
