@if (step(); as ceremony) {
  <div class="ceremony-overlay" aria-live="polite">
    <div
      class="ceremony-card"
      [class.ceremony-tone-hunter]="ceremony.tone === 'hunter'"
      [class.ceremony-tone-hider]="ceremony.tone === 'hider'"
      [class.ceremony-tone-local]="ceremony.tone === 'local'">
      <span class="ceremony-badge">{{ ceremony.badge }}</span>
      <p class="ceremony-kicker">Beginning Game Ceremony</p>
      <h2 class="ceremony-title">{{ ceremony.title }}</h2>
      <p class="ceremony-subtitle">{{ ceremony.subtitle }}</p>
    </div>
  </div>
}
